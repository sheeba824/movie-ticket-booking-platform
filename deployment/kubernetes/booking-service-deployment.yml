apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: movie-tickets
  labels:
    app: booking-service
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: booking-service
      version: v1
  template:
    metadata:
      labels:
        app: booking-service
        version: v1
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - booking-service
              topologyKey: kubernetes.io/hostname
      containers:
      - name: booking-service
        image: movie-tickets/booking-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8804
          name: http
        - containerPort: 8004
          name: metrics
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: production
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx1024m"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: booking-service-config
              key: db.host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: booking-service-config
              key: db.port
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: booking-service-config
              key: redis.host
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: booking-service-config
              key: kafka.brokers
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8804
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8804
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: logs
          mountPath: /var/log/app
      volumes:
      - name: logs
        emptyDir: {}
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: movie-tickets
  labels:
    app: booking-service
spec:
  type: ClusterIP
  ports:
  - port: 8804
    targetPort: 8804
    protocol: TCP
    name: http
  - port: 8004
    targetPort: 8004
    protocol: TCP
    name: metrics
  selector:
    app: booking-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: booking-service-hpa
  namespace: movie-tickets
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: booking-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
