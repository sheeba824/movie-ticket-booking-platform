server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: movie-ticket-booking-platform
  
  datasource:
    url: jdbc:postgresql://localhost:5432/movie_tickets_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false

  redis:
    host: localhost
    port: 6379
    timeout: 3000
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.movietickets.com
          jwk-set-uri: https://auth.movietickets.com/.well-known/jwks.json

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    dateformat: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

# Logging configuration
logging:
  level:
    root: INFO
    com.movietickets: DEBUG
    org.springframework.security: DEBUG
    org.hibernate: WARN
  format: '[%d{yyyy-MM-dd HH:mm:ss.SSS}] [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/application.log
    max-size: 100MB
    max-history: 30

# Actuator endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: always

# JWT Configuration
jwt:
  secret: your-secret-key-change-in-production-minimum-32-characters
  expiration: 86400  # 24 hours
  refresh-token-expiration: 604800  # 7 days

# Application specific configuration
app:
  name: Movie Ticket Booking Platform
  version: 1.0.0
  description: B2B/B2C Movie Ticket Booking Platform
  api:
    base-url: http://localhost:8080/api/v1
  
  booking:
    seat-lock-duration-seconds: 900  # 15 minutes
    cancellation-limit-hours: 1  # Cancel 1 hour before show

  payment:
    gateway: STRIPE
    api-key: ${PAYMENT_API_KEY}
    webhook-secret: ${PAYMENT_WEBHOOK_SECRET}

  notifications:
    email-provider: SENDGRID
    sms-provider: TWILIO
    email-api-key: ${EMAIL_API_KEY}
    sms-api-key: ${SMS_API_KEY}

  pricing:
    platform-commission-percentage: 10
    tax-percentage: 18

# Kafka configuration (for event-driven architecture)
kafka:
  bootstrap-servers: localhost:9092
  producer:
    acks: all
    retries: 3
    properties:
      linger.ms: 10
  consumer:
    group-id: movie-booking-group
    auto-offset-reset: earliest
    properties:
      session.timeout.ms: 30000
