name: Build and Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run tests
      run: mvn -B test --file backend/pom.xml

    - name: Build with Maven
      run: mvn -B package -DskipTests --file backend/pom.xml

    - name: SonarQube Scan
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_LOGIN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn -B clean verify sonar:sonar \
          -Dsonar.projectKey=movie-ticket-booking \
          -Dsonar.host.url=$SONAR_HOST_URL \
          -Dsonar.login=$SONAR_LOGIN \
          --file backend/pom.xml

    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to Staging
      run: |
        kubectl set image deployment/booking-service \
          booking-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop \
          -n movie-tickets-staging
        kubectl rollout status deployment/booking-service -n movie-tickets-staging

  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to Production (Blue-Green)
      run: |
        # Get current active version
        ACTIVE=$(kubectl get service booking-service-selector -n movie-tickets -o jsonpath='{.spec.selector.version}')
        
        # Determine new version
        if [ "$ACTIVE" = "v1" ]; then
          NEW_VERSION="v2"
        else
          NEW_VERSION="v1"
        fi
        
        # Deploy new version
        kubectl set image deployment/booking-service-$NEW_VERSION \
          booking-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
          -n movie-tickets
        
        # Wait for rollout
        kubectl rollout status deployment/booking-service-$NEW_VERSION -n movie-tickets
        
        # Run smoke tests
        kubectl run smoke-tests --image=curlimages/curl -n movie-tickets \
          -- curl http://booking-service:8804/actuator/health
        
        # Switch traffic
        kubectl patch service booking-service-selector -n movie-tickets \
          -p '{"spec":{"selector":{"version":"'$NEW_VERSION'"}}}'
